# Banco local
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/concurseiro}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA local
spring.jpa.hibernate.ddl-auto=validate

# Liquibase local
spring.liquibase.enabled=true

# CORS local
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# JWT local
jwt.secret=${JWT_SECRET:dev-only-change-this-secret-with-at-least-32-characters}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Admin local
app.admin.api-key=${ADMIN_API_KEY:dev-admin-key-change-this}

# Actuator local
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Swagger local
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Logs locais
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Redis local
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000