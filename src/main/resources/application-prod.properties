# =====================================
# PRODUÇÃO - Sobrescreve valores do application.properties
# =====================================

# Schema: não altera automaticamente em produção
spring.jpa.hibernate.ddl-auto=validate

# Pool mais conservador em produção
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20

# Desabilita Swagger em produção
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Actuator mais restrito
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# =====================================
# SSL / HTTPS
# =====================================
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${SSL_KEY_ALIAS}

# =====================================
# RATE LIMIT
# =====================================
rate.limit.enabled=true
