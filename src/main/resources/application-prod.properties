# =====================================
# PRODUÇÃO - Sobrescreve valores do application.properties
# =====================================

# Schema: não altera automaticamente em produção
spring.jpa.hibernate.ddl-auto=validate

# Pool mais conservador em produção
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20

# Desabilita Swagger em produção
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Cookies de autenticacao em producao devem trafegar apenas via HTTPS.
security.auth.cookie.secure=${AUTH_COOKIE_SECURE:true}
security.auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:None}

# Actuator mais restrito
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
