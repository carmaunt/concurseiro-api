# =====================================
# APLICAÇÃO
# =====================================
spring.application.name=concurseiro-api
app.admin.api-key=${APP_ADMIN_API_KEY:admin-dev-key}

# =====================================
# SERVIDOR
# =====================================
server.port=8080

# =====================================
# BANCO (PostgreSQL)
# =====================================
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:concurseiro}?sslmode=disable
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================================
# SEM LIQUIBASE (ABORTADO)
# =====================================
spring.liquibase.enabled=false

# =====================================
# JPA / HIBERNATE
# =====================================
# Hibernate cria/atualiza as tabelas automaticamente no Postgres.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =====================================
# JWT secret e expiração
# =====================================
jwt.secret=CONCURSEIRO_SUPER_SECRET_KEY_1234567890
jwt.expiration-ms=14400000

# =====================================
# CORS configurável
# =====================================
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:8080,http://localhost:5500,http://127.0.0.1:5500

# =====================================
# Expõe o endpoint /actuator/metrics
# =====================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true

# =====================================
# Dependência OpenAPI/Swagger UI (Spring Boot 4.x)
# =====================================
springdoc.api-docs.version=OPENAPI_3_1
