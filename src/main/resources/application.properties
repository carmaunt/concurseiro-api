# =====================================
# APLICAÇÃO
# =====================================
spring.application.name=concurseiro-api
app.admin.api-key=${APP_ADMIN_API_KEY:admin-dev-key}

# =====================================
# SERVIDOR
# =====================================
server.port=5000

# =====================================
# BANCO (PostgreSQL)
# =====================================
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:concurseiro}?sslmode=disable
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================================
# HikariCP Connection Pool
# =====================================
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000

# =====================================
# SEM LIQUIBASE
# =====================================
spring.liquibase.enabled=false

# =====================================
# JPA / HIBERNATE
# =====================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# =====================================
# JWT
# =====================================
jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:14400000}

# =====================================
# CORS
# =====================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# =====================================
# Actuator
# =====================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true

# =====================================
# Info Endpoint
# =====================================
info.app.name=concurseiro-api
info.app.description=API para gerenciamento de questoes de concursos
info.app.version=1.0.0
info.app.java-version=${java.version}

# =====================================
# OpenAPI / Swagger
# =====================================
springdoc.api-docs.version=OPENAPI_3_1
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
