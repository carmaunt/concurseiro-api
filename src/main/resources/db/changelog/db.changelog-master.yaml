# src/main/resources/db/changelog/db.changelog-master.yaml
databaseChangeLog:
  - changeSet:
      id: 001-create-questoes
      author: mauricio
      changes:
        - createTable:
            tableName: questoes
            columns:
              - column:
                  name: id_question
                  type: varchar(32)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: enunciado
                  type: varchar(10000)
                  constraints:
                    nullable: false
              - column:
                  name: questao
                  type: varchar(10000)
                  constraints:
                    nullable: false
              - column:
                  name: alternativas
                  type: varchar(2000)
                  constraints:
                    nullable: false
              - column:
                  name: disciplina
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: assunto
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: banca
                  type: varchar(160)
                  constraints:
                    nullable: false
              - column:
                  name: instituicao
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: ano
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: cargo
                  type: varchar(160)
                  constraints:
                    nullable: false
              - column:
                  name: nivel
                  type: varchar(40)
                  constraints:
                    nullable: false
              - column:
                  name: modalidade
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: gabarito
                  type: varchar(10)
                  constraints:
                    nullable: true
              - column:
                  name: criado_em
                  type: timestamp with time zone
                  constraints:
                    nullable: false

        - createIndex:
            tableName: questoes
            indexName: idx_questoes_disciplina
            columns:
              - column:
                  name: disciplina

        - createIndex:
            tableName: questoes
            indexName: idx_questoes_banca
            columns:
              - column:
                  name: banca

        - createIndex:
            tableName: questoes
            indexName: idx_questoes_instituicao
            columns:
              - column:
                  name: instituicao

        - createIndex:
            tableName: questoes
            indexName: idx_questoes_ano
            columns:
              - column:
                  name: ano