databaseChangeLog:
  - changeSet:
      id: 008-add-refresh-tokens
      author: mauricio
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_refresh_tokens
                    nullable: false

              - column:
                  name: token
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: usuario_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: expira_em
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

              - column:
                  name: revogado
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: refresh_tokens
            columnNames: token
            constraintName: uk_refresh_tokens_token

        - createIndex:
            tableName: refresh_tokens
            indexName: idx_refresh_tokens_usuario_id
            columns:
              - column:
                  name: usuario_id

        - addForeignKeyConstraint:
            baseTableName: refresh_tokens
            baseColumnNames: usuario_id
            referencedTableName: usuarios
            referencedColumnNames: id
            constraintName: fk_refresh_tokens_usuario
            onDelete: CASCADE