                  seo_titulo = 'Concurso Receita Federal 2026: 146 vagas',
                  seo_descricao = 'Concurso Receita Federal 2026 tem 146 vagas para Analista e Auditor. Veja salários, prazo do edital e como iniciar sua preparação.',
                  updated_at = CURRENT_TIMESTAMP
              WHERE tipo = 'NOTICIA'
                AND slug = 'governo-autoriza-concursos-receita-federal-banco-central-316-vagas';
