                  constraints:
                    nullable: false
              - column:
                  name: nome
                  type: varchar(160)
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: disciplinas
            columnNames: nome
            constraintName: uk_disciplinas_nome

