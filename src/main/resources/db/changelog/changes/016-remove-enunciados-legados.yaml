databaseChangeLog:
  - changeSet:
      id: 016-remove-enunciados-legados
      author: mauricio
      changes:
        - sql:
            sql: |
              INSERT INTO migracao_enunciado_oids_legados (oid)
              SELECT DISTINCT enunciado
              FROM questoes
              WHERE enunciado IS NOT NULL
              ON CONFLICT DO NOTHING
        - sql:
            sql: DROP TRIGGER IF EXISTS trg_questoes_enunciado_compat ON questoes
        - sql:
            sql: DROP FUNCTION IF EXISTS sincronizar_questoes_enunciado_compat()
        - dropColumn:
            tableName: questoes
            columnName: enunciado
        - sql:
            splitStatements: false
            sql: |
              DO $$
              DECLARE
                  registro record;
              BEGIN
                  FOR registro IN SELECT oid FROM migracao_enunciado_oids_legados LOOP
                      IF EXISTS (
                          SELECT 1
                          FROM pg_largeobject_metadata
                          WHERE oid = registro.oid
                      ) THEN
                          PERFORM lo_unlink(registro.oid);
                      END IF;
                  END LOOP;
              END
              $$;
        - dropTable:
            tableName: migracao_enunciado_oids_legados
      rollback:
        - addColumn:
            tableName: questoes
            columns:
              - column:
                  name: enunciado
                  type: oid
        - sql:
            sql: |
              UPDATE questoes q
              SET enunciado = lo_from_bytea(0, convert_to(e.conteudo, 'UTF8'))
              FROM enunciados e
              WHERE e.id = q.enunciado_id
        - addNotNullConstraint:
            tableName: questoes
            columnName: enunciado
            columnDataType: oid
        - sql:
            splitStatements: false
            sql: |
              CREATE TABLE migracao_enunciado_oids_legados (
                  oid oid PRIMARY KEY
              );

              INSERT INTO migracao_enunciado_oids_legados (oid)
              SELECT DISTINCT enunciado
              FROM questoes
              WHERE enunciado IS NOT NULL;

              CREATE OR REPLACE FUNCTION sincronizar_questoes_enunciado_compat()
              RETURNS trigger
              LANGUAGE plpgsql
              AS $$
              DECLARE
                  texto_enunciado text;
                  hash_enunciado varchar(64);
              BEGIN
                  IF TG_OP = 'UPDATE' AND NEW.enunciado_id IS DISTINCT FROM OLD.enunciado_id THEN
                      INSERT INTO migracao_enunciado_oids_legados (oid)
                      VALUES (OLD.enunciado)
                      ON CONFLICT DO NOTHING;

                      SELECT conteudo
                      INTO texto_enunciado
                      FROM enunciados
                      WHERE id = NEW.enunciado_id;

                      IF texto_enunciado IS NOT NULL THEN
                          NEW.enunciado := lo_from_bytea(0, convert_to(texto_enunciado, 'UTF8'));
                      END IF;
                  ELSIF TG_OP = 'UPDATE' AND NEW.enunciado IS DISTINCT FROM OLD.enunciado THEN
                      INSERT INTO migracao_enunciado_oids_legados (oid)
                      VALUES (OLD.enunciado)
                      ON CONFLICT DO NOTHING;

                      texto_enunciado := convert_from(lo_get(NEW.enunciado), 'UTF8');
                      hash_enunciado := encode(
                          digest(convert_to(texto_enunciado, 'UTF8'), 'sha256'),
                          'hex'
                      );

                      INSERT INTO enunciados (conteudo, hash_sha256, criado_em)
                      VALUES (texto_enunciado, hash_enunciado, CURRENT_TIMESTAMP)
                      ON CONFLICT (hash_sha256) DO NOTHING;

                      SELECT id
                      INTO NEW.enunciado_id
                      FROM enunciados
                      WHERE hash_sha256 = hash_enunciado;
                  ELSIF TG_OP = 'INSERT' AND NEW.enunciado_id IS NULL AND NEW.enunciado IS NOT NULL THEN
                      texto_enunciado := convert_from(lo_get(NEW.enunciado), 'UTF8');
                      hash_enunciado := encode(
                          digest(convert_to(texto_enunciado, 'UTF8'), 'sha256'),
                          'hex'
                      );

                      INSERT INTO enunciados (conteudo, hash_sha256, criado_em)
                      VALUES (texto_enunciado, hash_enunciado, CURRENT_TIMESTAMP)
                      ON CONFLICT (hash_sha256) DO NOTHING;

                      SELECT id
                      INTO NEW.enunciado_id
                      FROM enunciados
                      WHERE hash_sha256 = hash_enunciado;
                  ELSIF TG_OP = 'INSERT' AND NEW.enunciado IS NULL AND NEW.enunciado_id IS NOT NULL THEN
                      SELECT conteudo
                      INTO texto_enunciado
                      FROM enunciados
                      WHERE id = NEW.enunciado_id;

                      IF texto_enunciado IS NOT NULL THEN
                          NEW.enunciado := lo_from_bytea(0, convert_to(texto_enunciado, 'UTF8'));
                      END IF;
                  END IF;

                  RETURN NEW;
              END
              $$;

              CREATE TRIGGER trg_questoes_enunciado_compat
              BEFORE INSERT OR UPDATE OF enunciado, enunciado_id
              ON questoes
              FOR EACH ROW
              EXECUTE FUNCTION sincronizar_questoes_enunciado_compat();
