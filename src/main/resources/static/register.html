<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Concurseiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            Concurseiro<span>.</span>
        </a>
        <ul class="navbar-nav">
            <li><a href="/login.html" class="nav-link">Entrar</a></li>
        </ul>
    </nav>

    <main class="auth-page">
        <div class="auth-card">
            <h2>Crie sua conta</h2>
            <p class="auth-subtitle">Cadastre-se para acessar as questões de concursos</p>

            <div id="alertBox" class="alert alert-error">
                <span id="alertMsg"></span>
            </div>

            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" class="form-control" placeholder="Seu nome" autocomplete="name" required>
                    <div class="form-error" id="nomeError">Informe seu nome</div>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" class="form-control" placeholder="seu@email.com" autocomplete="email" required>
                    <div class="form-error" id="emailError">Informe um e-mail válido</div>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="password-toggle">
                        <input type="password" id="senha" class="form-control" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required minlength="6">
                        <button type="button" class="toggle-btn" onclick="togglePassword()">&#128065;</button>
                    </div>
                    <div class="form-error" id="senhaError">A senha deve ter pelo menos 6 caracteres</div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="submitBtn">
                    Criar conta
                </button>
            </form>

            <div class="auth-footer">
                Já tem uma conta? <a href="/login.html">Entrar</a>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        function togglePassword() {
            var input = document.getElementById('senha');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function showError(fieldId, show) {
            var input = document.getElementById(fieldId);
            var error = document.getElementById(fieldId + 'Error');
            if (show) {
                input.classList.add('error');
                error.classList.add('visible');
            } else {
                input.classList.remove('error');
                error.classList.remove('visible');
            }
        }

        function showAlert(msg, type) {
            var box = document.getElementById('alertBox');
            var msgEl = document.getElementById('alertMsg');
            box.className = 'alert alert-' + type + ' visible';
            msgEl.textContent = msg;
        }

        function hideAlert() {
            document.getElementById('alertBox').classList.remove('visible');
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideAlert();

            var nome = document.getElementById('nome').value.trim();
            var email = document.getElementById('email').value.trim();
            var senha = document.getElementById('senha').value;

            var nomeValid = nome.length > 0;
            var emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            var senhaValid = senha.length >= 6;

            showError('nome', !nomeValid);
            showError('email', !emailValid);
            showError('senha', !senhaValid);

            if (!nomeValid || !emailValid || !senhaValid) return;

            var btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Cadastrando...';

            try {
                await api.register(nome, email, senha);
                showAlert('Conta criada com sucesso! Aguarde a ativação pelo administrador.', 'success');
                document.getElementById('registerForm').reset();
            } catch (err) {
                showAlert(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Criar conta';
            }
        });

        if (api.isAuthenticated()) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
