<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concurseiro - Painel Administrativo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            Concurseiro<span>.</span> <small class="navbar-tag">Painel</small>
        </a>
        <ul class="navbar-nav" id="navLinks"></ul>
    </nav>

    <main class="panel-home" id="mainContent"></main>

    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var nav = document.getElementById('navLinks');
            var main = document.getElementById('mainContent');

            if (!api.isAuthenticated()) {
                window.location.href = '/login.html';
                return;
            }

            var user = api.getUser();

            var roleLi = document.createElement('li');
            var roleSpan = document.createElement('span');
            roleSpan.className = 'nav-link badge-role';
            roleSpan.textContent = user ? user.role : '';
            roleLi.appendChild(roleSpan);

            var emailLi = document.createElement('li');
            var emailSpan = document.createElement('span');
            emailSpan.className = 'nav-link';
            emailSpan.style.cursor = 'default';
            emailSpan.textContent = user ? user.email : '';
            emailLi.appendChild(emailSpan);

            var btnLi = document.createElement('li');
            var logoutBtn = document.createElement('button');
            logoutBtn.className = 'btn btn-outline';
            logoutBtn.style.fontSize = '0.85rem';
            logoutBtn.textContent = 'Sair';
            logoutBtn.addEventListener('click', function() { api.logout(); });
            btnLi.appendChild(logoutBtn);

            nav.appendChild(roleLi);
            nav.appendChild(emailLi);
            nav.appendChild(btnLi);

            main.innerHTML = '';
            var heading = document.createElement('h1');
            heading.className = 'panel-title';
            heading.textContent = 'Painel Administrativo';
            main.appendChild(heading);

            var subtitle = document.createElement('p');
            subtitle.className = 'panel-subtitle';
            subtitle.textContent = 'Gerencie questões, catálogo e usuários da plataforma.';
            main.appendChild(subtitle);

            var grid = document.createElement('div');
            grid.className = 'panel-grid';

            var cards = [
                { title: 'Questões', desc: 'Cadastrar, editar e excluir questões de concursos.', href: '#' },
                { title: 'Disciplinas', desc: 'Gerenciar disciplinas do catálogo.', href: '#' },
                { title: 'Bancas', desc: 'Gerenciar bancas organizadoras.', href: '#' },
                { title: 'Instituições', desc: 'Gerenciar instituições.', href: '#' },
                { title: 'Usuários', desc: 'Listar, ativar e remover usuários.', href: '#' }
            ];

            cards.forEach(function(c) {
                var card = document.createElement('a');
                card.className = 'panel-card';
                card.href = c.href;

                var h3 = document.createElement('h3');
                h3.textContent = c.title;
                var p = document.createElement('p');
                p.textContent = c.desc;

                card.appendChild(h3);
                card.appendChild(p);
                grid.appendChild(card);
            });

            main.appendChild(grid);
        });
    </script>
</body>
</html>
